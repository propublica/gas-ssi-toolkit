<!DOCTYPE html>
<html>

<head>
    <base target="_top">
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #1a73e8;
            --hover-blue: #f1f3f4;
            --border-color: #dadce0;
            --text-main: #3c4043;
            --text-secondary: #5f6368;
        }

        body {
            padding: 0;
            margin: 0;
            font-family: 'Google Sans', Roboto, Arial, sans-serif;
            background-color: #ffffff;
            color: var(--text-main);
        }

        .container {
            padding: 16px;
        }

        .guide-card {
            background-color: #f8f9fa;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 24px;
            text-align: center;
            transition: background-color 0.2s;
        }

        .guide-card:hover {
            background-color: #f1f3f4;
        }

        .guide-link {
            color: var(--primary-blue);
            font-weight: 500;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 14px;
        }

        .section {
            margin-bottom: 28px;
        }

        h3 {
            font-size: 11px;
            font-weight: 500;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin: 0 0 12px 4px;
        }

        .tool-btn {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding: 12px 16px;
            margin-bottom: 8px;
            border-radius: 24px;
            border: 1px solid var(--border-color);
            background: white;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Google Sans', sans-serif;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-main);
        }

        .tool-btn:hover {
            background-color: var(--hover-blue);
            border-color: transparent;
            color: var(--primary-blue);
        }

        .tool-btn:active {
            background-color: #e8eaed;
            transform: scale(0.98);
        }

        .icon {
            margin-right: 12px;
            font-size: 18px;
            width: 24px;
            text-align: center;
        }

        .status-footer {
            margin-top: 40px;
            padding: 16px;
            border-top: 1px solid #eee;
            font-size: 11px;
            color: var(--text-secondary);
            text-align: center;
            line-height: 1.5;
        }

        .loading {
            opacity: 0.5;
            pointer-events: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="guide-card">
            <a href="https://docs.google.com/document/d/1BQJzBHiE6L0hvU6NMD0jaQE71VWRpWH-vNQu3UtGjBA/edit?tab=t.66jobsqlduah#heading=h.h5k0s81xpiiq"
                target="_blank" class="guide-link">
                <span>📖</span> View User Guide ↗
            </a>
        </div>

        <div class="section">
            <h3>Main Tools</h3>
            <button class="tool-btn" onclick="run(event, 'importDriveLinks')">
                <span class="icon">📂</span> Import Drive Links
            </button>
            <button class="tool-btn" onclick="run(event, 'showSourceDialog')">
                <span class="icon">▶️</span> Run AI Inference
            </button>
        </div>

        <div class="section">
            <h3>Extras</h3>
            <button class="tool-btn" onclick="run(event, 'sampleRowsToEvaluation')">
                <span class="icon">🎲</span> Sample Rows
            </button>
            <button class="tool-btn" onclick="run(event, 'extractTextFromSelection')">
                <span class="icon">📜</span> Extract Text
            </button>
        </div>
    </div>

    <div class="status-footer">
        <strong>SSI Tools v2.0</strong><br>
        Powered by Gemini 2.0 Flash<br>
        Evaluation Unrestricted Mode
    </div>

    <script>
        function run(e, fn) {
            const btn = e.currentTarget;
            const originalContent = btn.innerHTML;

            btn.classList.add('loading');
            btn.innerHTML = '<span class="icon">⏳</span> Working...';

            google.script.run
                .withSuccessHandler(() => {
                    btn.classList.remove('loading');
                    btn.innerHTML = originalContent;
                })
                .withFailureHandler(msg => {
                    alert('Error: ' + msg);
                    btn.classList.remove('loading');
                    btn.innerHTML = originalContent;
                })
                .runTool(fn);
        }
    </script>
</body>

</html>
